[package]
name = "aetherion-kernel"
version = "0.0.1"
edition = "2021"
authors = ["Cabrel Foka <cabrel@aetherion.dev>"]
license = "MIT"
description = "Aetherion OS Kernel - A next-generation OS written in Rust"

[dependencies]
# Phase 1.3: Heap allocator dependencies
spin = { version = "0.9", default-features = false, features = ["spin_mutex"] }

# Couche 1 HAL Dependencies (2025 validated versions)
x86_64 = "0.15.1"
uart_16550 = "0.3.0"
pic8259 = "0.10.4"
linked_list_allocator = "0.10.5"
lazy_static = { version = "1.4.0", features = ["spin_no_std"] }
bitflags = "2.4.2"
log = "0.4.20"
volatile = "0.5.2"

# Math library for no_std
libm = "0.2"

[profile.dev]
panic = "abort"

[profile.release]
panic = "abort"
lto = true         # Link Time Optimization
opt-level = 2      # Optimize for size and speed
codegen-units = 1  # Better optimization, slower compile

[profile.test]
panic = "unwind"   # Allow panics in tests
